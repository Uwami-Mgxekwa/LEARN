<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#8c3cdc">
    <title>Bookings — LEARN</title>
    <link rel="icon" type="image/jpeg" href="../../assets/logo.jpeg">
    <link rel="apple-touch-icon" href="../../assets/logo.jpeg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/variables.css">
    <link rel="stylesheet" href="../../css/components.css">
    <link rel="stylesheet" href="tutor-dashboard.css">
</head>
<body>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <a href="../../index.html" class="sidebar-logo"><img src="../../assets/logo.jpeg" alt="LEARN"></a>
        <button class="sidebar-close" id="sidebarClose" aria-label="Close"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    </div>
    <nav class="sidebar-nav">
        <a href="dashboard.html" class="sidebar-link" data-page="dashboard"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Overview</a>
        <a href="availability.html" class="sidebar-link" data-page="availability"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Availability</a>
        <a href="bookings.html" class="sidebar-link" data-page="bookings"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Bookings</a>
        <a href="earnings.html" class="sidebar-link" data-page="earnings"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Earnings</a>
        <a href="profile.html" class="sidebar-link" data-page="profile"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>My Profile</a>
    </nav>
    <div class="sidebar-footer">
        <button class="sidebar-link sidebar-logout" id="logoutBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Log Out</button>
    </div>
</aside>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="dash-layout">
    <header class="topbar">
        <button class="topbar-menu" id="menuBtn" aria-label="Open menu"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <div class="topbar-title">Bookings</div>
        <div class="topbar-user">
            <div class="user-avatar" id="userAvatar">T</div>
            <span id="userName">Loading...</span>
        </div>
    </header>

    <main class="dash-main">

        <!-- Filter tabs -->
        <div class="lessons-tabs" style="margin-bottom:1.25rem;">
            <button class="lesson-tab active" data-status="all">All</button>
            <button class="lesson-tab" data-status="confirmed">Confirmed</button>
            <button class="lesson-tab" data-status="pending">Pending</button>
            <button class="lesson-tab" data-status="cancelled">Cancelled</button>
        </div>

        <div class="dash-card">
            <div class="dash-card-header">
                <span class="dash-card-title">All Bookings</span>
                <span id="bookingCount" style="font-size:0.82rem;color:var(--text-muted);">Loading...</span>
            </div>
            <div id="bookingsList">
                <div class="skeleton" style="height:70px;border-radius:10px;margin-bottom:0.75rem;"></div>
                <div class="skeleton" style="height:70px;border-radius:10px;margin-bottom:0.75rem;"></div>
                <div class="skeleton" style="height:70px;border-radius:10px;"></div>
            </div>
            <div class="empty-state" id="noBookings" style="display:none;">
                <div class="empty-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div>
                <h3>No bookings found</h3>
                <p>Bookings will appear here once students book your slots.</p>
            </div>
        </div>

    </main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="../../js/config.js"></script>
<script src="../../js/auth.js"></script>
<script src="../../js/utils.js"></script>
<script src="tutor-nav.js"></script>
<script defer>
let allBookings = [];
let activeStatus = 'all';

document.addEventListener('DOMContentLoaded', () => {
    initFirebase();
    auth.onAuthStateChanged(async (user) => {
        if (!user) { window.location.href = '../auth/login.html'; return; }
        const profile = await getUserProfile(user.uid);
        if (profile?.role !== 'tutor') { window.location.href = '../auth/login.html'; return; }
        setTutorTopbar(profile.firstName, profile.lastName);
        initTutorNav('bookings');
        loadBookings(user.uid);
    });

    document.querySelectorAll('.lesson-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.lesson-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            activeStatus = tab.dataset.status;
            renderBookings();
        });
    });
});

async function loadBookings(uid) {
    try {
        const snap = await db.collection('bookings')
            .where('tutorId', '==', uid)
            .orderBy('createdAt', 'desc')
            .get();
        allBookings = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderBookings();
    } catch (err) {
        document.getElementById('bookingsList').innerHTML = '<p style="color:var(--text-muted);font-size:0.85rem;padding:1rem 0;">Could not load bookings.</p>';
    }
}

function renderBookings() {
    const list = document.getElementById('bookingsList');
    const noBookings = document.getElementById('noBookings');
    const filtered = activeStatus === 'all' ? allBookings : allBookings.filter(b => b.status === activeStatus);

    document.getElementById('bookingCount').textContent = `${filtered.length} booking${filtered.length !== 1 ? 's' : ''}`;

    if (filtered.length === 0) {
        list.innerHTML = '';
        noBookings.style.display = 'block';
        return;
    }
    noBookings.style.display = 'none';
    list.innerHTML = filtered.map(b => `
        <div class="booking-row">
            <div class="booking-row-time">
                <div class="booking-row-day">${b.day || '—'}</div>
                <div class="booking-row-hour">${b.time || '—'}</div>
            </div>
            <div class="booking-row-info">
                <div class="booking-row-student">${b.studentName || 'Student'}</div>
                <div class="booking-row-type">${b.type === 'group' ? 'Group Lesson' : 'Private Lesson'}</div>
            </div>
            <div class="booking-row-right">
                <span class="booking-status status-${b.status || 'confirmed'}">${b.status || 'confirmed'}</span>
                <div class="booking-row-price">$${((b.price || 0) * 0.8).toFixed(0)} earned</div>
            </div>
        </div>
    `).join('');
}
</script>

<style>
.lessons-tabs { display: flex; gap: 0.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0; }
.lesson-tab { padding: 0.6rem 1.25rem; background: none; border: none; border-bottom: 2px solid transparent; font-family: var(--font-body); font-size: 0.9rem; font-weight: 600; color: var(--text-muted); cursor: pointer; transition: all var(--transition-fast); margin-bottom: -1px; -webkit-tap-highlight-color: transparent; }
.lesson-tab.active { color: var(--purple); border-bottom-color: var(--purple); }
.lesson-tab:hover { color: var(--text-primary); }
</style>
</body>
</html>
