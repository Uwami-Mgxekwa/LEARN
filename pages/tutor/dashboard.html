            Log Out

</aside>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="dash-layout">
    <header class="topbar">
        <button class="topbar-menu" id="menuBtn" aria-label="Open menu">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="topbar-title">Overview</div>
        <div class="topbar-user">
            <div class="user-avatar" id="userAvatar">T</div>
            <span id="userName">Loading...</span>
        </div>
    </header>

    <main class="dash-main">

        <!-- Stats -->
        <div class="stats-row" id="statsRow">
            <div class="stat-card">
                <div class="stat-card-icon purple">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                </div>
                <div>
                    <div class="stat-card-value" id="statUpcoming">—</div>
                    <div class="stat-card-label">Upcoming Lessons</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-card-icon green">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                </div>
                <div>
                    <div class="stat-card-value" id="statTotal">—</div>
                    <div class="stat-card-label">Total Lessons</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-card-icon amber">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                </div>
                <div>
                    <div class="stat-card-value" id="statEarnings">—</div>
                    <div class="stat-card-label">Total Earnings</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-card-icon blue">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                </div>
                <div>
                    <div class="stat-card-value" id="statRating">—</div>
                    <div class="stat-card-label">Average Rating</div>
                </div>
            </div>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:1.25rem;">

            <!-- Upcoming bookings -->
            <div class="dash-card">
                <div class="dash-card-header">
                    <span class="dash-card-title">Upcoming Lessons</span>
                    <a href="bookings.html" class="btn btn-ghost btn-sm">View all</a>
                </div>
                <div id="upcomingList">
                    <div class="skeleton" style="height:60px;margin-bottom:0.75rem;"></div>
                    <div class="skeleton" style="height:60px;margin-bottom:0.75rem;"></div>
                    <div class="skeleton" style="height:60px;"></div>
                </div>
            </div>

            <!-- Quick actions -->
            <div class="dash-card">
                <div class="dash-card-header">
                    <span class="dash-card-title">Quick Actions</span>
                </div>
                <div style="display:flex;flex-direction:column;gap:0.75rem;">
                    <a href="availability.html" class="btn btn-primary btn-full" style="justify-content:flex-start;gap:0.75rem;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                        Add Availability Slot
                    </a>
                    <a href="bookings.html" class="btn btn-outline btn-full" style="justify-content:flex-start;gap:0.75rem;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
                        View All Bookings
                    </a>
                    <a href="earnings.html" class="btn btn-outline btn-full" style="justify-content:flex-start;gap:0.75rem;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                        View Earnings
                    </a>
                    <a href="profile.html" class="btn btn-ghost btn-full" style="justify-content:flex-start;gap:0.75rem;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        Edit Profile
                    </a>
                </div>
            </div>
        </div>

    </main>
</div>

<!-- Parse SDK -->
<script src="https://npmcdn.com/parse/dist/parse.min.js"></script>
<script src="../../js/config.js"></script>
<script src="../../js/auth.js"></script>
<script src="../../js/utils.js"></script>
<script src="tutor-nav.js"></script>
<script defer>
document.addEventListener('DOMContentLoaded', () => {
    initFirebase();
    auth.onAuthStateChanged(async (user) => {
        const isPreview = new URLSearchParams(window.location.search).get('preview') === 'true' || sessionStorage.getItem('devUser');

        if (!user && !isPreview) {
            window.location.href = '../auth/login.html';
            return;
        }

        if (user) {
            const profile = await getUserProfile(user.id);
            if (profile?.role !== 'tutor') { window.location.href = '../auth/login.html'; return; }
            setTutorTopbar(profile.firstName, profile.lastName);
            initTutorNav('dashboard');
            loadDashboard(user.id, profile);
        } else if (isPreview) {
            const devData = JSON.parse(sessionStorage.getItem('devUser') || '{"name":"Emeka"}');
            setTutorTopbar(devData.name || 'Demo', 'Tutor');
            initTutorNav('dashboard');
            loadDashboard('demo', { firstName: devData.name || 'Demo', lastName: 'Tutor' });
        }
    });
});

async function loadDashboard(uid, profile) {
    try {
        // Stats from Tutor record
        const Tutor = Parse.Object.extend("Tutor");
        const tutorQuery = new Parse.Query(Tutor);
        tutorQuery.equalTo("user", Parse.User.current());
        const tutorObj = await tutorQuery.first().catch(() => null);
        document.getElementById('statTotal').textContent = tutorObj ? (tutorObj.get('totalLessons') || 0) : 0;
        const rating = tutorObj ? tutorObj.get('rating') : null;
        document.getElementById('statRating').textContent = rating ? rating.toFixed(1) : '--';

        // Bookings
        const Booking = Parse.Object.extend("Booking");
        const bookingQuery = new Parse.Query(Booking);
        bookingQuery.equalTo("tutorId", uid);
        bookingQuery.equalTo("status", "confirmed");
        bookingQuery.descending("createdAt");
        bookingQuery.limit(20);
        const bookings = await bookingQuery.find().catch(() => []);

        const bookingData = bookings.map(b => ({
            id: b.id,
            day: b.get('day'),
            time: b.get('time'),
            type: b.get('type'),
            price: b.get('price') || 0,
            studentName: b.get('studentName') || 'Student',
        }));

        const upcoming = bookingData.slice(0, 5);
        document.getElementById('statUpcoming').textContent = upcoming.length;

        const totalEarnings = bookingData.reduce((sum, b) => sum + (b.price * 0.8), 0);
        document.getElementById('statEarnings').textContent = '$' + totalEarnings.toFixed(0);

        const list = document.getElementById('upcomingList');
        if (upcoming.length === 0) {
            list.innerHTML = '<div class="empty-state" style="padding:2rem 0;"><p>No upcoming lessons yet.</p></div>';
            return;
        }

        list.innerHTML = upcoming.map(b => {
            const typeLabel = b.type === 'group' ? 'Group Lesson' : 'Private Lesson';
            const earn = 'R' + (b.price * 0.8).toFixed(0);
            return '<div class="booking-row">' +
                '<div class="booking-row-time">' +
                '<div class="booking-row-day">' + (b.day || '--') + '</div>' +
                '<div class="booking-row-hour">' + (b.time || '--') + '</div>' +
                '</div>' +
                '<div class="booking-row-info">' +
                '<div class="booking-row-student">' + b.studentName + '</div>' +
                '<div class="booking-row-type">' + typeLabel + '</div>' +
                '</div>' +
                '<div class="booking-row-right">' +
                '<span class="booking-status status-confirmed">confirmed</span>' +
                '<div class="booking-row-price">' + earn + '</div>' +
                '</div></div>';
        }).join('');
    } catch (err) {
        console.error('Dashboard load error:', err);
    }
}
</script>
</body>
</html>
