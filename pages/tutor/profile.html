<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#8c3cdc">
    <title>My Profile - LEARN Tutor</title>
    <link rel="icon" type="image/jpeg" href="../../assets/logo.jpeg">
    <link rel="apple-touch-icon" href="../../assets/logo.jpeg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/variables.css">
    <link rel="stylesheet" href="../../css/components.css">
    <link rel="stylesheet" href="tutor-dashboard.css">
</head>
<body>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <a href="../../index.html" class="sidebar-logo"><img src="../../assets/logo.jpeg" alt="LEARN"></a>
        <button class="sidebar-close" id="sidebarClose" aria-label="Close"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    </div>
    <nav class="sidebar-nav">
        <a href="dashboard.html" class="sidebar-link" data-page="dashboard"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Overview</a>
        <a href="availability.html" class="sidebar-link" data-page="availability"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Availability</a>
        <a href="bookings.html" class="sidebar-link" data-page="bookings"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Bookings</a>
        <a href="earnings.html" class="sidebar-link" data-page="earnings"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Earnings</a>
        <a href="profile.html" class="sidebar-link" data-page="profile"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>My Profile</a>
    </nav>
    <div class="sidebar-footer">
        <div style="padding:0 1rem 0.75rem;font-size:0.72rem;color:var(--text-muted);text-align:center;">Powered by <a href="https://brelinx.com" target="_blank" rel="noopener" style="color:var(--text-muted);text-decoration:underline;text-underline-offset:2px;">Brelinx</a></div>
        <button class="sidebar-link sidebar-logout" id="logoutBtn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Log Out</button>
    </div>
</aside>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="dash-layout">
    <header class="topbar">
        <button class="topbar-menu" id="menuBtn" aria-label="Open menu"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <div class="topbar-title">My Profile</div>
        <div class="topbar-user">
            <div class="user-avatar" id="userAvatar">T</div>
            <span id="userName">Loading...</span>
        </div>
    </header>

    <main class="dash-main">
        <div class="profile-grid">

            <!-- Avatar card -->
            <div class="profile-avatar-card">
                <div class="profile-avatar-circle" id="profileAvatarCircle">T</div>
                <div class="profile-avatar-name" id="profileFullName">Loading...</div>
                <div class="profile-avatar-email" id="profileEmail"></div>
                <span class="profile-role-badge">Tutor</span>
                <div style="margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border);">
                    <div style="font-size:0.78rem;color:var(--text-muted);margin-bottom:0.25rem;">Rating</div>
                    <div style="font-family:var(--font-display);font-size:1.25rem;font-weight:800;color:var(--purple);" id="profileRating">--</div>
                </div>
                <div style="margin-top:0.75rem;">
                    <div style="font-size:0.78rem;color:var(--text-muted);margin-bottom:0.25rem;">Total Lessons</div>
                    <div style="font-family:var(--font-display);font-size:1.25rem;font-weight:800;color:var(--text-primary);" id="profileLessons">--</div>
                </div>
            </div>

            <!-- Form -->
            <div class="profile-form-card">
                <h2 class="profile-section-title">Personal Information</h2>
                <div id="profileAlert" class="alert" style="margin-bottom:1rem;"></div>
                <form id="profileForm" novalidate>
                    <div class="form-row">
                        <div class="form-group">
                        <label class="form-label" for="profileFirstName">First Name</label>
                        <input type="text" id="profileFirstName" class="form-input" placeholder="John" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="profileLastName">Last Name</label>
                        <input type="text" id="profileLastName" class="form-input" placeholder="Doe" required>
                    </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="profileEmailField">Email</label>
                        <input type="email" id="profileEmailField" class="form-input" disabled style="opacity:0.6;cursor:not-allowed;">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="profilePhone">Phone Number (optional)</label>
                        <input type="tel" id="profilePhone" class="form-input" placeholder="555 123 4567">
                    </div>
                    <button type="submit" id="saveProfileBtn" class="btn btn-primary">Save Changes</button>
                </form>

                <div class="profile-divider"></div>

                <h2 class="profile-section-title">Teaching Profile</h2>
                <div id="tutorProfileAlert" class="alert" style="margin-bottom:1rem;"></div>
                <form id="tutorProfileForm" novalidate>
                    <div class="form-group">
                        <label class="form-label" for="profileBio">Bio</label>
                        <textarea id="profileBio" class="form-input form-textarea" placeholder="Tell students about yourself, your teaching style, and experience..." style="min-height:120px;"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="profileCategory">Teaching Category</label>
                        <select id="profileCategory" class="form-input">
                            <option value="">Select category</option>
                            <option value="languages">Languages</option>
                            <option value="mathematics">Mathematics &amp; Statistics</option>
                            <option value="sciences">Natural Sciences</option>
                            <option value="technology">Technology &amp; Coding</option>
                            <option value="business">Business &amp; Accounting</option>
                            <option value="arts">Arts, Music &amp; Drama</option>
                            <option value="humanities">Humanities</option>
                            <option value="trades">Trades &amp; Vocational Skills</option>
                            <option value="fitness">Fitness &amp; Wellness</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Subjects / Specialties</label>
                        <div class="form-hint" style="margin-bottom:0.5rem;">Type a subject and press Enter or comma to add</div>
                        <div id="profileSubjectTagsWrap" style="display:flex;flex-wrap:wrap;gap:0.4rem;padding:0.5rem;border:1px solid var(--border);border-radius:var(--radius-md);min-height:44px;cursor:text;" onclick="document.getElementById('profileSubjectsInput').focus()">
                            <input type="text" id="profileSubjectsInput" style="border:none;outline:none;flex:1;min-width:120px;font-size:0.9rem;background:transparent;" placeholder="e.g. Algebra, Python, Guitar...">
                        </div>
                        <input type="hidden" id="profileSubjects">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="profileRate">Hourly Rate (USD)</label>
                            <input type="number" id="profileRate" class="form-input" min="1" placeholder="25">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="profileExperience">Experience</label>
                            <select id="profileExperience" class="form-input">
                                <option value="0-1">Less than 1 year</option>
                                <option value="1-3">1-3 years</option>
                                <option value="3-5">3-5 years</option>
                                <option value="5-10">5-10 years</option>
                                <option value="10+">10+ years</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="profileQualSearch">Highest Qualification</label>
                        <div style="position:relative;">
                            <input type="text" id="profileQualSearch" class="form-input" placeholder="Search qualification..." autocomplete="off" style="margin-bottom:0;">
                            <div id="profileQualDropdown" style="display:none;position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);max-height:220px;overflow-y:auto;z-index:100;box-shadow:var(--shadow-md);"></div>
                        </div>
                        <input type="hidden" id="profileQualification">
                        <div id="profileQualSelected" style="margin-top:0.5rem;font-size:0.85rem;color:var(--purple);font-weight:600;"></div>
                    </div>
                    <button type="submit" id="saveTutorProfileBtn" class="btn btn-primary">Save Teaching Profile</button>
                </form>

                <div class="profile-divider"></div>

                <h2 class="profile-section-title">Change Password</h2>
                <div id="passwordAlert" class="alert" style="margin-bottom:1rem;"></div>
                <form id="passwordForm" novalidate>
                    <div class="form-group">
                        <label class="form-label" for="newPassword">New Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="newPassword" class="form-input" placeholder="At least 6 characters" autocomplete="new-password">
                            <button type="button" class="password-toggle" aria-label="Toggle"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="confirmNewPassword">Confirm Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="confirmNewPassword" class="form-input" placeholder="Re-enter" autocomplete="new-password">
                            <button type="button" class="password-toggle" aria-label="Toggle"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
                        </div>
                    </div>
                    <button type="submit" id="savePasswordBtn" class="btn btn-outline">Update Password</button>
                </form>
            </div>
        </div>
    </main>
</div>

<!-- Parse SDK --><script src="https://npmcdn.com/parse/dist/parse.min.js"></script>
<script src="../../js/config.js"></script>
<script src="../../js/auth.js"></script>
<script src="../../js/utils.js"></script>
<script src="../../js/phone-picker.js"></script>
<script src="tutor-nav.js"></script>
<script defer>
document.addEventListener('DOMContentLoaded', () => {
    initFirebase();
    initPhonePicker('profilePhone');
    auth.onAuthStateChanged(async (user) => {
        if (!user) { window.location.href = '../auth/login.html'; return; }
        const profile = await getUserProfile(user.id);
        if (profile?.role !== 'tutor') { window.location.href = '../auth/login.html'; return; }

        setTutorTopbar(profile.firstName, profile.lastName);
        initTutorNav('profile');

        // Load Tutor record from Parse
        const Tutor = Parse.Object.extend("Tutor");
        const tutorQuery = new Parse.Query(Tutor);
        tutorQuery.equalTo("user", Parse.User.current());
        const tutorObj = await tutorQuery.first().catch(() => null);

        const initials = ((profile.firstName || '').charAt(0) + (profile.lastName || '').charAt(0)).toUpperCase();
        document.getElementById('profileAvatarCircle').textContent = initials;
        document.getElementById('profileFullName').textContent = (profile.firstName || '') + ' ' + (profile.lastName || '');
        document.getElementById('profileEmail').textContent = user.get('email') || '';
        document.getElementById('profileFirstName').value = profile.firstName || '';
        document.getElementById('profileLastName').value = profile.lastName || '';
        document.getElementById('profileEmailField').value = user.get('email') || '';

        if (tutorObj) {
            document.getElementById('profilePhone').value = tutorObj.get('phone') || '';
            document.getElementById('profileBio').value = tutorObj.get('bio') || '';
            document.getElementById('profileRate').value = tutorObj.get('hourlyRate') || '';
            document.getElementById('profileExperience').value = tutorObj.get('experience') || '1-3';
            document.getElementById('profileCategory').value = tutorObj.get('category') || '';
            // Load subjects as tags
            const savedSubjects = tutorObj.get('subjects') || [];
            savedSubjects.forEach(s => addProfileSubjectTag(s));
            // Load qualification
            const savedQual = tutorObj.get('qualification') || '';
            if (savedQual) {
                document.getElementById('profileQualification').value = savedQual;
                const match = PROFILE_NQF.find(q => q.value === savedQual);
                if (match) document.getElementById('profileQualSelected').textContent = 'Selected: ' + match.label;
            }
            const rating = tutorObj.get('rating');
            document.getElementById('profileRating').textContent = rating ? rating.toFixed(1) + ' \u2605' : '--';
            document.getElementById('profileLessons').textContent = tutorObj.get('totalLessons') || 0;
        }

        // Save personal info
        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fn = document.getElementById('profileFirstName').value.trim();
            const ln = document.getElementById('profileLastName').value.trim();
            if (!fn || !ln) { showAlert('profileAlert', 'Please fill in both name fields.', 'warning'); return; }
            setButtonLoading('saveProfileBtn', true);
            try {
                const currentUser = Parse.User.current();
                currentUser.set('firstName', fn);
                currentUser.set('lastName', ln);
                await currentUser.save();
                document.getElementById('profileFullName').textContent = fn + ' ' + ln;
                setTutorTopbar(fn, ln);
                showAlert('profileAlert', 'Profile updated.', 'success');
            } catch (err) { showAlert('profileAlert', 'Failed to update. Try again.', 'error'); }
            setButtonLoading('saveProfileBtn', false);
        });

        // Save teaching profile
        document.getElementById('tutorProfileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const bio = document.getElementById('profileBio').value.trim();
            const rate = parseFloat(document.getElementById('profileRate').value);
            const experience = document.getElementById('profileExperience').value;
            const category = document.getElementById('profileCategory').value;
            const qualification = document.getElementById('profileQualification').value;
            if (!bio || isNaN(rate)) { showAlert('tutorProfileAlert', 'Please fill in bio and rate.', 'warning'); return; }
            setButtonLoading('saveTutorProfileBtn', true);
            try {
                if (tutorObj) {
                    tutorObj.set('bio', bio);
                    tutorObj.set('hourlyRate', rate);
                    tutorObj.set('experience', experience);
                    tutorObj.set('category', category);
                    tutorObj.set('subjects', profileSubjectTags);
                    tutorObj.set('qualification', qualification);
                    await tutorObj.save();
                }
                showAlert('tutorProfileAlert', 'Teaching profile updated.', 'success');
            } catch (err) { showAlert('tutorProfileAlert', 'Failed to update. Try again.', 'error'); }
            setButtonLoading('saveTutorProfileBtn', false);
        });

        // Change password
        document.getElementById('passwordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const pw = document.getElementById('newPassword').value;
            const cpw = document.getElementById('confirmNewPassword').value;
            if (pw.length < 6) { showAlert('passwordAlert', 'Password must be at least 6 characters.', 'warning'); return; }
            if (pw !== cpw) { showAlert('passwordAlert', 'Passwords do not match.', 'warning'); return; }
            setButtonLoading('savePasswordBtn', true);
            try {
                const currentUser = Parse.User.current();
                currentUser.set('password', pw);
                await currentUser.save();
                showAlert('passwordAlert', 'Password updated.', 'success');
                document.getElementById('newPassword').value = '';
                document.getElementById('confirmNewPassword').value = '';
            } catch (err) { showAlert('passwordAlert', err.message || 'Failed.', 'error'); }
            setButtonLoading('savePasswordBtn', false);
        });
    });

    setupPasswordToggles();
});

// NQF Qualifications
const PROFILE_NQF = [
    { value: 'nqf1', label: 'NQF 1 - General Education Certificate (Grade 9)' },
    { value: 'nqf2', label: 'NQF 2 - Elementary Certificate (Grade 10)' },
    { value: 'nqf3', label: 'NQF 3 - Intermediate Certificate (Grade 11)' },
    { value: 'nqf4-nsc', label: 'NQF 4 - National Senior Certificate (NSC / Matric)' },
    { value: 'nqf4-sc', label: 'NQF 4 - Senior Certificate' },
    { value: 'nqf4-tech', label: 'NQF 4 - Technical Matric' },
    { value: 'nqf5', label: 'NQF 5 - Higher Certificate' },
    { value: 'nqf5-it', label: 'NQF 5 - Higher Certificate in IT' },
    { value: 'nqf5-biz', label: 'NQF 5 - Higher Certificate in Business' },
    { value: 'nqf6-dip', label: 'NQF 6 - National Diploma' },
    { value: 'nqf6-eng', label: 'NQF 6 - National Diploma in Engineering' },
    { value: 'nqf6-adv', label: 'NQF 6 - Advanced Certificate in HR' },
    { value: 'nqf7-ba', label: 'NQF 7 - Bachelor of Arts (BA)' },
    { value: 'nqf7-bsc', label: 'NQF 7 - Bachelor of Science (BSc)' },
    { value: 'nqf7-bcom', label: 'NQF 7 - Bachelor of Commerce (BCom)' },
    { value: 'nqf7-llb', label: 'NQF 7 - Bachelor of Laws (LLB)' },
    { value: 'nqf7-adv-dip', label: 'NQF 7 - Advanced Diploma in Accounting' },
    { value: 'nqf8-hons', label: 'NQF 8 - Honours Degree' },
    { value: 'nqf8-pgdip', label: 'NQF 8 - Postgraduate Diploma in Education' },
    { value: 'nqf9-msc', label: 'NQF 9 - Master of Science (MSc)' },
    { value: 'nqf9-ma', label: 'NQF 9 - Master of Arts (MA)' },
    { value: 'nqf9-mba', label: 'NQF 9 - MBA' },
    { value: 'nqf9-med', label: 'NQF 9 - Master of Education (MEd)' },
    { value: 'nqf10-phd', label: 'NQF 10 - PhD' },
    { value: 'nqf10-dphil', label: 'NQF 10 - DPhil' },
    { value: 'nqf10-dlitt', label: 'NQF 10 - DLitt' },
    { value: 'nqf10-ded', label: 'NQF 10 - Doctor of Education (DEd)' },
    { value: 'tvet-n1', label: 'TVET - N1' }, { value: 'tvet-n2', label: 'TVET - N2' },
    { value: 'tvet-n3', label: 'TVET - N3' }, { value: 'tvet-n4', label: 'TVET - N4' },
    { value: 'tvet-n5', label: 'TVET - N5' }, { value: 'tvet-n6', label: 'TVET - N6' },
    { value: 'tvet-eng', label: 'TVET - Engineering Studies' },
    { value: 'tvet-hosp', label: 'TVET - Hospitality Studies' },
    { value: 'prof-ca', label: 'Professional - Chartered Accountant (CA)' },
    { value: 'prof-atty', label: 'Professional - Attorney (Admitted)' },
    { value: 'prof-med', label: 'Professional - Medical Doctor (MBChB)' },
    { value: 'prof-eng', label: 'Professional - Professional Engineer (Pr.Eng)' },
    { value: 'short-course', label: 'Short Course (Non-NQF accredited)' },
    { value: 'other', label: 'Other Qualification' },
];

// Profile qualification search
const pQualSearch = document.getElementById('profileQualSearch');
const pQualDropdown = document.getElementById('profileQualDropdown');
function renderProfileQualDropdown(filter) {
    const filtered = PROFILE_NQF.filter(q => q.label.toLowerCase().includes(filter.toLowerCase()));
    pQualDropdown.innerHTML = filtered.length === 0
        ? '<div style="padding:0.75rem 1rem;color:var(--text-muted);font-size:0.88rem;">No results</div>'
        : filtered.map(q => `<div class="pqual-opt" data-value="${q.value}" style="padding:0.65rem 1rem;cursor:pointer;font-size:0.88rem;border-bottom:1px solid var(--border-light);">${q.label}</div>`).join('');
    pQualDropdown.querySelectorAll('.pqual-opt').forEach(opt => {
        opt.addEventListener('mouseenter', () => opt.style.background = 'var(--purple-tint)');
        opt.addEventListener('mouseleave', () => opt.style.background = '');
        opt.addEventListener('click', () => {
            document.getElementById('profileQualification').value = opt.dataset.value;
            document.getElementById('profileQualSelected').textContent = 'Selected: ' + opt.textContent;
            pQualSearch.value = '';
            pQualDropdown.style.display = 'none';
        });
    });
    pQualDropdown.style.display = filtered.length ? 'block' : 'none';
}
pQualSearch.addEventListener('input', () => renderProfileQualDropdown(pQualSearch.value));
pQualSearch.addEventListener('focus', () => renderProfileQualDropdown(pQualSearch.value));
document.addEventListener('click', (e) => {
    if (!e.target.closest('#profileQualSearch') && !e.target.closest('#profileQualDropdown')) pQualDropdown.style.display = 'none';
});

// Profile subject tags
const profileSubjectInput = document.getElementById('profileSubjectsInput');
const profileSubjectWrap = document.getElementById('profileSubjectTagsWrap');
let profileSubjectTags = [];
function addProfileSubjectTag(val) {
    val = val.trim();
    if (!val || profileSubjectTags.includes(val)) return;
    profileSubjectTags.push(val);
    const tag = document.createElement('span');
    tag.style.cssText = 'display:inline-flex;align-items:center;gap:0.3rem;background:var(--purple-tint);color:var(--purple);border-radius:20px;padding:0.2rem 0.6rem;font-size:0.82rem;font-weight:600;';
    tag.innerHTML = val + '<button type="button" style="background:none;border:none;cursor:pointer;color:var(--purple);font-size:1rem;line-height:1;padding:0;" aria-label="Remove">&times;</button>';
    tag.querySelector('button').addEventListener('click', () => {
        profileSubjectTags = profileSubjectTags.filter(s => s !== val);
        tag.remove();
    });
    profileSubjectWrap.insertBefore(tag, profileSubjectInput);
    profileSubjectInput.value = '';
}
profileSubjectInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); addProfileSubjectTag(profileSubjectInput.value); }
    if (e.key === ',') { e.preventDefault(); addProfileSubjectTag(profileSubjectInput.value); }
    if (e.key === 'Backspace' && !profileSubjectInput.value && profileSubjectTags.length) {
        const last = profileSubjectTags.pop();
        [...profileSubjectWrap.querySelectorAll('span')].find(s => s.textContent.startsWith(last))?.remove();
    }
});
profileSubjectInput.addEventListener('blur', () => { if (profileSubjectInput.value.trim()) addProfileSubjectTag(profileSubjectInput.value); });

</script>
</body>
</html>
