<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#8c3cdc">
    <title>My Lessons — LEARN</title>
    <link rel="icon" type="image/jpeg" href="../../assets/logo.jpeg">
    <link rel="apple-touch-icon" href="../../assets/logo.jpeg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/variables.css">
    <link rel="stylesheet" href="../../css/components.css">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <a href="../../index.html" class="sidebar-logo">
            <img src="../../assets/logo.jpeg" alt="LEARN">
        </a>
        <button class="sidebar-close" id="sidebarClose" aria-label="Close menu">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
    </div>
    <nav class="sidebar-nav">
        <a href="dashboard.html" class="sidebar-link">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            Find Tutors
        </a>
        <a href="my-lessons.html" class="sidebar-link active">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            My Lessons
        </a>
        <a href="profile.html" class="sidebar-link">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            My Profile
        </a>
    </nav>
    <div class="sidebar-footer">
        <button class="sidebar-link sidebar-logout" id="logoutBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Log Out
        </button>
    </div>
</aside>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="dash-layout">
    <header class="topbar">
        <button class="topbar-menu" id="menuBtn" aria-label="Open menu">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="topbar-title">My Lessons</div>
        <div class="topbar-user">
            <div class="user-avatar" id="userAvatar">?</div>
            <span id="userName">Loading...</span>
        </div>
    </header>

    <main class="dash-main">

        <!-- Tabs -->
        <div class="lessons-tabs">
            <button class="lesson-tab active" data-tab="upcoming">Upcoming</button>
            <button class="lesson-tab" data-tab="past">Past</button>
        </div>

        <!-- Lessons list -->
        <div id="lessonsContainer">
            <div class="lessons-loading">
                <div class="skeleton skeleton-line medium" style="height:80px; border-radius:12px; margin-bottom:0.75rem;"></div>
                <div class="skeleton skeleton-line medium" style="height:80px; border-radius:12px; margin-bottom:0.75rem;"></div>
                <div class="skeleton skeleton-line medium" style="height:80px; border-radius:12px;"></div>
            </div>
        </div>

        <!-- Empty -->
        <div id="noLessons" style="display:none;" class="empty-state">
            <div class="empty-icon" aria-hidden="true">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            </div>
            <h3>No lessons yet</h3>
            <p>Book your first lesson to get started.</p>
            <a href="dashboard.html" class="btn btn-primary btn-sm">Find a Tutor</a>
        </div>

    </main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="../../js/config.js"></script>
<script src="../../js/auth.js"></script>
<script src="../../js/utils.js"></script>
<script defer>
document.addEventListener('DOMContentLoaded', () => {
    initFirebase();

    auth.onAuthStateChanged(async (user) => {
        if (!user) { window.location.href = '../auth/login.html'; return; }
        const profile = await getUserProfile(user.uid);
        const name = profile?.firstName || user.displayName?.split(' ')[0] || 'Student';
        document.getElementById('userName').textContent = name;
        document.getElementById('userAvatar').textContent = name.charAt(0).toUpperCase();
        loadLessons(user.uid, 'upcoming');
    });

    // Tabs
    document.querySelectorAll('.lesson-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.lesson-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            auth.onAuthStateChanged(user => {
                if (user) loadLessons(user.uid, tab.dataset.tab);
            });
        });
    });

    // Sidebar
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    document.getElementById('menuBtn').addEventListener('click', () => {
        sidebar.classList.add('open'); overlay.classList.add('visible'); document.body.style.overflow = 'hidden';
    });
    const close = () => { sidebar.classList.remove('open'); overlay.classList.remove('visible'); document.body.style.overflow = ''; };
    document.getElementById('sidebarClose').addEventListener('click', close);
    overlay.addEventListener('click', close);
    document.getElementById('logoutBtn').addEventListener('click', () => logoutUser());
});

async function loadLessons(uid, tab) {
    const container = document.getElementById('lessonsContainer');
    const noLessons = document.getElementById('noLessons');
    container.innerHTML = '<div class="lessons-loading"><div class="skeleton skeleton-line" style="height:80px;border-radius:12px;margin-bottom:0.75rem;"></div><div class="skeleton skeleton-line" style="height:80px;border-radius:12px;"></div></div>';
    noLessons.style.display = 'none';

    try {
        const snapshot = await db.collection('bookings')
            .where('studentId', '==', uid)
            .orderBy('createdAt', 'desc')
            .get();

        const lessons = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));

        if (lessons.length === 0) {
            container.innerHTML = '';
            noLessons.style.display = 'block';
            return;
        }

        container.innerHTML = lessons.map(l => `
            <div class="lesson-card">
                <div class="lesson-card-left">
                    <div class="lesson-day">${l.day || '—'}</div>
                    <div class="lesson-time">${l.time || '—'}</div>
                </div>
                <div class="lesson-card-body">
                    <div class="lesson-tutor">${l.tutorName || 'Tutor'}</div>
                    <div class="lesson-type">${l.type === 'group' ? 'Group Lesson' : 'Private Lesson'}</div>
                </div>
                <div class="lesson-card-right">
                    <span class="lesson-status status-${l.status || 'confirmed'}">${l.status || 'confirmed'}</span>
                    <div class="lesson-price">$${l.price || 0}</div>
                </div>
            </div>
        `).join('');

    } catch (err) {
        container.innerHTML = '<p style="color:var(--text-muted);font-size:0.88rem;padding:1rem 0;">Could not load lessons.</p>';
    }
}
</script>

<style>
.lessons-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.25rem; border-bottom: 1px solid var(--border); padding-bottom: 0; }
.lesson-tab { padding: 0.6rem 1.25rem; background: none; border: none; border-bottom: 2px solid transparent; font-family: var(--font-body); font-size: 0.9rem; font-weight: 600; color: var(--text-muted); cursor: pointer; transition: all var(--transition-fast); margin-bottom: -1px; -webkit-tap-highlight-color: transparent; }
.lesson-tab.active { color: var(--purple); border-bottom-color: var(--purple); }
.lesson-tab:hover { color: var(--text-primary); }

.lesson-card { display: flex; align-items: center; gap: 1rem; background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 0.75rem; transition: box-shadow var(--transition-fast); }
.lesson-card:hover { box-shadow: var(--shadow-sm); }
.lesson-card-left { text-align: center; min-width: 60px; flex-shrink: 0; }
.lesson-day { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); }
.lesson-time { font-size: 1rem; font-weight: 700; color: var(--text-primary); }
.lesson-card-body { flex: 1; }
.lesson-tutor { font-weight: 700; font-size: 0.92rem; color: var(--text-primary); margin-bottom: 0.15rem; }
.lesson-type { font-size: 0.8rem; color: var(--text-muted); }
.lesson-card-right { text-align: right; flex-shrink: 0; }
.lesson-status { display: inline-block; padding: 0.2rem 0.6rem; border-radius: var(--radius-full); font-size: 0.72rem; font-weight: 700; text-transform: capitalize; margin-bottom: 0.25rem; }
.status-confirmed { background: var(--success-light); color: var(--success); }
.status-pending { background: var(--warning-light); color: var(--warning); }
.status-cancelled { background: var(--error-light); color: var(--error); }
.lesson-price { font-size: 0.88rem; font-weight: 700; color: var(--text-primary); }
.lessons-loading { padding: 0.5rem 0; }
</style>
</body>
</html>
